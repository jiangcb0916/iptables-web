{% extends 'base.html' %}
{% block main %}
<div class="flex-1 flex flex-col overflow-hidden">
  <header class="bg-white border-b border-gray-200 shadow-sm z-10">
    <div class="flex items-center justify-between h-16 px-6">
      <h1 class="text-xl font-semibold text-dark flex items-center">
        <i class="fa fa-key text-primary mr-2"></i>
        SSH 密钥配置
      </h1>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto bg-gray-50 p-6">
    <div class="container mx-auto max-w-5xl space-y-6">
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
        <h2 class="text-lg font-semibold mb-3">一键配置参数</h2>
        <p class="text-sm text-secondary mb-4">输入目标主机密码后，系统会自动完成：生成密钥、下发公钥、验证密钥登录。</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label for="host-ip" class="block text-sm font-medium text-gray-700 mb-1">目标主机 IP <span class="text-danger">*</span></label>
            <input id="host-ip" type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md" placeholder="172.16.80.132">
          </div>
          <div>
            <label for="ssh-port" class="block text-sm font-medium text-gray-700 mb-1">SSH 端口</label>
            <input id="ssh-port" type="number" class="w-full px-3 py-2 border border-gray-300 rounded-md" value="22" min="1" max="65535">
          </div>
          <div>
            <label for="ssh-username" class="block text-sm font-medium text-gray-700 mb-1">SSH 用户名 <span class="text-danger">*</span></label>
            <input id="ssh-username" type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md" value="root" placeholder="root">
          </div>
          <div>
            <label for="key-type" class="block text-sm font-medium text-gray-700 mb-1">密钥类型</label>
            <select id="key-type" class="w-full px-3 py-2 border border-gray-300 rounded-md">
              <option value="ed25519">ed25519（推荐）</option>
              <option value="rsa">rsa</option>
            </select>
          </div>
          <div class="md:col-span-2">
            <label for="ssh-password" class="block text-sm font-medium text-gray-700 mb-1">目标主机密码 <span class="text-danger">*</span></label>
            <input id="ssh-password" type="password" class="w-full px-3 py-2 border border-gray-300 rounded-md" placeholder="仅用于自动下发公钥，不会保存到该页面">
          </div>
        </div>

        <div class="mt-5 flex items-center gap-3">
          <button id="setup-btn" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-primary/90 transition-colors">
            一键配置并验证
          </button>
          <span id="setup-status" class="text-sm text-secondary"></span>
        </div>
      </div>

      <div id="result-card" class="hidden bg-white rounded-xl shadow-sm border border-gray-200 p-5 space-y-4">
        <h2 class="text-lg font-semibold">配置结果</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
          <div>
            <div class="text-gray-500">私钥保存路径</div>
            <div id="private-key-path" class="text-gray-800 break-all"></div>
          </div>
          <div>
            <div class="text-gray-500">公钥保存路径</div>
            <div id="public-key-path" class="text-gray-800 break-all"></div>
          </div>
        </div>

        <div>
          <div class="flex items-center justify-between mb-1">
            <h3 class="font-medium">私钥（复制到“添加主机 -> SSH密钥”）</h3>
            <button class="copy-btn px-3 py-1 text-sm border border-gray-300 rounded-md hover:bg-gray-50" data-target="private-key-text">复制私钥</button>
          </div>
          <textarea id="private-key-text" rows="10" readonly class="w-full px-3 py-2 border border-gray-300 rounded-md font-mono text-xs bg-gray-50"></textarea>
        </div>

        <div>
          <div class="flex items-center justify-between mb-1">
            <h3 class="font-medium">公钥（已自动下发）</h3>
            <button class="copy-btn px-3 py-1 text-sm border border-gray-300 rounded-md hover:bg-gray-50" data-target="public-key-text">复制公钥</button>
          </div>
          <textarea id="public-key-text" rows="3" readonly class="w-full px-3 py-2 border border-gray-300 rounded-md font-mono text-xs bg-gray-50"></textarea>
        </div>
      </div>

      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
        <div class="flex flex-col gap-3 mb-3">
          <div class="flex items-center justify-between">
            <h2 class="text-lg font-semibold">配置记录</h2>
            <button id="refresh-records-btn" class="px-3 py-1 text-sm border border-gray-300 rounded-md hover:bg-gray-50">刷新记录</button>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
            <input id="records-keyword" type="text" class="md:col-span-2 w-full px-3 py-2 border border-gray-300 rounded-md text-sm" placeholder="搜索：IP / 用户 / 密钥类型">
            <select id="records-status" class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm">
              <option value="all">全部状态</option>
              <option value="active">有效</option>
              <option value="revoked">主机公钥已删除</option>
              <option value="setup_failed">配置失败</option>
              <option value="revoke_failed">删除失败</option>
            </select>
            <div class="flex items-center gap-2">
              <button id="records-search-btn" class="px-3 py-2 text-sm border border-primary text-primary rounded-md hover:bg-primary/10">搜索</button>
              <button id="records-clear-btn" class="px-3 py-2 text-sm border border-gray-300 rounded-md hover:bg-gray-50">重置</button>
            </div>
          </div>
          <div class="text-xs text-gray-500">
            共 <span id="records-total">0</span> 条记录
          </div>
        </div>
        <div class="overflow-x-auto border border-gray-100 rounded-lg">
          <table class="min-w-full text-sm">
            <thead class="bg-gray-50 text-gray-600">
              <tr>
                <th class="px-3 py-2 text-left">时间</th>
                <th class="px-3 py-2 text-left">目标主机</th>
                <th class="px-3 py-2 text-left">用户</th>
                <th class="px-3 py-2 text-left">类型</th>
                <th class="px-3 py-2 text-left">状态</th>
                <th class="px-3 py-2 text-right">操作</th>
              </tr>
            </thead>
            <tbody id="records-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>
{% endblock main %}

{% block script %}
<script>
  let setupRecords = [];
  let recordsMeta = { total: 0, keyword: '', status: 'all' };
  const CSRF_TOKEN = "{{ csrf_token() }}";

  function getFormData() {
    return {
      host_ip: document.getElementById('host-ip').value.trim(),
      ssh_port: Number(document.getElementById('ssh-port').value || 22),
      username: document.getElementById('ssh-username').value.trim(),
      password: document.getElementById('ssh-password').value,
      key_type: document.getElementById('key-type').value
    };
  }

  function showStatus(text, isError = false) {
    const statusEl = document.getElementById('setup-status');
    statusEl.textContent = text || '';
    statusEl.classList.remove('text-secondary', 'text-danger', 'text-success');
    statusEl.classList.add(isError ? 'text-danger' : 'text-success');
  }

  function fillResult(data) {
    document.getElementById('private-key-path').textContent = data.private_key_path || '';
    document.getElementById('public-key-path').textContent = data.public_key_path || '';
    document.getElementById('private-key-text').value = data.private_key || '';
    document.getElementById('public-key-text').value = data.public_key || '';
    document.getElementById('result-card').classList.remove('hidden');
  }

  function fallbackCopyText(text) {
    const tempTextArea = document.createElement('textarea');
    tempTextArea.value = text;
    tempTextArea.style.position = 'fixed';
    tempTextArea.style.left = '-9999px';
    document.body.appendChild(tempTextArea);
    tempTextArea.focus();
    tempTextArea.select();
    try {
      const copied = document.execCommand('copy');
      document.body.removeChild(tempTextArea);
      return copied;
    } catch (error) {
      document.body.removeChild(tempTextArea);
      return false;
    }
  }

  async function copyFromTarget(targetId) {
    const el = document.getElementById(targetId);
    if (!el) return;
    const text = el.value || el.textContent || '';
    if (!text.trim()) {
      showStatus('没有可复制内容', true);
      return;
    }

    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        showStatus('复制成功');
        return;
      }
      const copied = fallbackCopyText(text);
      if (copied) {
        showStatus('复制成功');
      } else {
        showStatus('复制失败，请手动复制', true);
      }
    } catch (error) {
      const copied = fallbackCopyText(text);
      if (copied) {
        showStatus('复制成功');
      } else {
        showStatus('复制失败，请手动复制', true);
      }
    }
  }

  function renderRecords() {
    const tbody = document.getElementById('records-tbody');
    if (!tbody) return;
    const totalEl = document.getElementById('records-total');
    if (totalEl) {
      totalEl.textContent = String(recordsMeta.total || 0);
    }
    if (!setupRecords.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="px-3 py-4 text-center text-gray-500">暂无配置记录</td></tr>';
      return;
    }

    tbody.innerHTML = setupRecords.map((record) => {
      let statusLabel = '';
      if (record.setup_status !== 'success') {
        statusLabel = '<span class="px-2 py-1 text-xs rounded bg-red-100 text-red-700">配置失败</span>';
      } else if (record.revoke_status === 'revoked') {
        statusLabel = '<span class="px-2 py-1 text-xs rounded bg-gray-100 text-gray-700">主机公钥已删除</span>';
      } else if (record.revoke_status === 'failed') {
        statusLabel = '<span class="px-2 py-1 text-xs rounded bg-yellow-100 text-yellow-700">删除失败</span>';
      } else {
        statusLabel = '<span class="px-2 py-1 text-xs rounded bg-green-100 text-green-700">有效</span>';
      }

      const canRemoveTargetKey = record.setup_status === 'success' && record.revoke_status !== 'revoked';
      const canDeleteRecord = record.setup_status !== 'success' || record.revoke_status === 'revoked';
      const deleteRecordTitle = canDeleteRecord
        ? '删除该配置记录'
        : '请先删除目标主机密钥，再删除记录';
      return `
        <tr class="border-t border-gray-100 hover:bg-gray-50/70 transition-colors">
          <td class="px-3 py-2">${record.created_at || '-'}</td>
          <td class="px-3 py-2">${record.host_ip || '-'}:${record.ssh_port || 22}</td>
          <td class="px-3 py-2">${record.target_username || '-'}</td>
          <td class="px-3 py-2">${record.key_type || '-'}</td>
          <td class="px-3 py-2">${statusLabel}</td>
          <td class="px-3 py-2 text-right">
            <div class="inline-flex items-center gap-2">
              <button class="use-record-btn px-2 py-1 text-xs border border-gray-300 rounded hover:bg-gray-50" data-record-id="${record.id}">
                查看结果
              </button>
              <button class="revoke-target-key-btn px-2 py-1 text-xs border border-red-300 text-red-600 rounded hover:bg-red-50 disabled:opacity-50" data-record-id="${record.id}" ${canRemoveTargetKey ? '' : 'disabled'}>
                删除目标主机密钥
              </button>
              <button class="delete-record-btn px-2 py-1 text-xs border border-gray-300 text-gray-600 rounded hover:bg-gray-50 disabled:opacity-50" data-record-id="${record.id}" title="${deleteRecordTitle}" ${canDeleteRecord ? '' : 'disabled'}>
                删除记录
              </button>
            </div>
          </td>
        </tr>
      `;
    }).join('');

    document.querySelectorAll('.use-record-btn').forEach((btn) => {
      btn.addEventListener('click', async function () {
        const recordId = Number(btn.dataset.recordId);
        const record = setupRecords.find(item => item.id === recordId);
        if (!record) return;
        if (record.setup_status !== 'success') {
          showStatus(record.error_message || '该记录为失败记录，无法加载私钥', true);
          return;
        }
        try {
          const response = await fetch(`/ssh_key_setup_record/${record.id}/private_key`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRF-Token': CSRF_TOKEN
            },
            body: JSON.stringify({})
          });
          const data = await response.json();
          if (!response.ok || !data.success) {
            throw new Error(data.message || '获取私钥失败');
          }
          fillResult(data.data || {});
          showStatus(`已加载记录 #${record.id}，可直接复制私钥`);
        } catch (error) {
          showStatus(error.message || '获取私钥失败', true);
        }
      });
    });

    document.querySelectorAll('.revoke-target-key-btn').forEach((btn) => {
      btn.addEventListener('click', async function () {
        const recordId = Number(btn.dataset.recordId);
        const confirmDelete = window.confirm('确认删除目标主机上的该条公钥吗？\n该操作会保留配置记录，仅删除远端 authorized_keys 中对应公钥。');
        if (!confirmDelete) return;
        btn.disabled = true;
        try {
          const response = await fetch(`/ssh_key_setup_record/${recordId}/remove_target_key`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRF-Token': CSRF_TOKEN
            },
            body: JSON.stringify({})
          });
          const data = await response.json();
          if (!response.ok || !data.success) {
            throw new Error(data.message || '删除目标主机密钥失败');
          }

          showStatus(data.message || '目标主机密钥已删除');
          await loadRecords();
        } catch (error) {
          showStatus(error.message || '删除目标主机密钥失败', true);
        } finally {
          btn.disabled = false;
        }
      });
    });

    document.querySelectorAll('.delete-record-btn').forEach((btn) => {
      btn.addEventListener('click', async function () {
        const recordId = Number(btn.dataset.recordId);
        const record = setupRecords.find(item => item.id === recordId);
        if (!record) return;
        const canDeleteRecord = record.setup_status !== 'success' || record.revoke_status === 'revoked';
        if (!canDeleteRecord) {
          showStatus('请先执行“删除目标主机密钥”，再删除记录', true);
          return;
        }
        const confirmDelete = window.confirm('确认删除该配置记录吗？\n这会删除记录并尝试删除本地密钥文件。');
        if (!confirmDelete) return;
        btn.disabled = true;
        try {
          const response = await fetch(`/ssh_key_setup_record/${recordId}`, {
            method: 'DELETE',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRF-Token': CSRF_TOKEN
            },
            body: JSON.stringify({})
          });
          const data = await response.json();
          if (!response.ok || !data.success) {
            throw new Error(data.message || '删除记录失败');
          }
          showStatus(data.message || '删除记录成功');
          await loadRecords();
        } catch (error) {
          showStatus(error.message || '删除记录失败', true);
        } finally {
          btn.disabled = false;
        }
      });
    });
  }

  async function loadRecords() {
    const keywordEl = document.getElementById('records-keyword');
    const statusEl = document.getElementById('records-status');
    const keyword = (keywordEl && keywordEl.value ? keywordEl.value.trim() : '');
    const status = (statusEl && statusEl.value ? statusEl.value : 'all');
    try {
      const params = new URLSearchParams({
        limit: '50',
        keyword,
        status
      });
      const response = await fetch(`/ssh_key_setup_records?${params.toString()}`);
      const data = await response.json();
      if (!response.ok || !data.success) {
        throw new Error(data.message || '获取配置记录失败');
      }
      setupRecords = Array.isArray(data.data) ? data.data : [];
      recordsMeta = data.meta || { total: setupRecords.length, keyword, status };
      renderRecords();
    } catch (error) {
      showStatus(error.message || '获取配置记录失败', true);
    }
  }

  document.addEventListener('DOMContentLoaded', function () {
    const setupBtn = document.getElementById('setup-btn');
    setupBtn.addEventListener('click', async function () {
      const formData = getFormData();
      if (!formData.host_ip || !formData.username || !formData.password) {
        showStatus('请填写目标IP、用户名和密码', true);
        return;
      }

      setupBtn.disabled = true;
      const originalText = setupBtn.textContent;
      setupBtn.textContent = '配置中...';
      showStatus('正在生成密钥并安装公钥，请稍候...');
      try {
        const response = await fetch('/ssh_key_setup', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRF-Token': CSRF_TOKEN
          },
          body: JSON.stringify(formData)
        });
        const data = await response.json();
        if (!response.ok || !data.success) {
          throw new Error(data.message || 'SSH密钥配置失败');
        }
        fillResult(data.data || {});
        showStatus(data.message || 'SSH密钥配置成功');
        await loadRecords();
      } catch (error) {
        showStatus(error.message || 'SSH密钥配置失败', true);
      } finally {
        setupBtn.disabled = false;
        setupBtn.textContent = originalText;
      }
    });

    document.querySelectorAll('.copy-btn').forEach((btn) => {
      btn.addEventListener('click', function () {
        copyFromTarget(btn.dataset.target);
      });
    });

    document.getElementById('refresh-records-btn').addEventListener('click', function () {
      loadRecords();
    });

    document.getElementById('records-search-btn').addEventListener('click', function () {
      loadRecords();
    });

    document.getElementById('records-clear-btn').addEventListener('click', function () {
      document.getElementById('records-keyword').value = '';
      document.getElementById('records-status').value = 'all';
      loadRecords();
    });

    document.getElementById('records-keyword').addEventListener('keydown', function (event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        loadRecords();
      }
    });

    document.getElementById('records-status').addEventListener('change', function () {
      loadRecords();
    });

    loadRecords();
  });
</script>
{% endblock script %}
