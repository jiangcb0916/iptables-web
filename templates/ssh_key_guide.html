{% extends 'base.html' %}
{% block main %}
<style>
  .key-page-bg {
    background: #f8fafc;
  }
  .key-ui {
    font-size: 16px;
    line-height: 1.58;
  }
  .key-glass-header {
    background: #ffffff;
  }
  .key-panel {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05);
  }
  .key-panel-title {
    color: #0f172a;
    letter-spacing: 0.2px;
    font-size: 1.2rem;
  }
  .key-hint {
    color: #64748b;
    font-size: 1.05rem;
  }
  .key-field {
    border-color: #cfd8e6;
    background: #fff;
    transition: all 0.2s ease;
  }
  .key-field:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
  }
  .key-btn-primary {
    background: #2563eb;
    border: 1px solid #2563eb;
    color: #fff;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .key-btn-primary:hover {
    background: #1d4ed8;
    border-color: #1d4ed8;
    transform: translateY(-1px);
    box-shadow: 0 8px 16px rgba(37, 99, 235, 0.2);
  }
  .key-btn-subtle {
    border: 1px solid #d6deea;
    background: #fff;
    color: #334155;
    transition: all 0.18s ease;
  }
  .key-btn-subtle:hover {
    background: #f8fafc;
    border-color: #c2cddd;
  }
  .key-segment {
    background: #f8fafc;
    border: 1px solid #d8e1ee;
  }
  .key-segment-btn {
    color: #475569;
    transition: all 0.18s ease;
  }
  .key-segment-btn.active {
    background: #2563eb;
    color: #fff;
    box-shadow: 0 6px 14px rgba(37, 99, 235, 0.25);
  }
  .key-result-box {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
  }
  .key-table-wrap {
    border: 1px solid #e6ebf4;
    border-radius: 12px;
    overflow: hidden;
  }
  .key-table thead {
    background: #f8fafc;
  }
  .key-table thead th {
    font-weight: 600;
    color: #475569;
    padding-top: 10px;
    padding-bottom: 10px;
  }
  .key-table tbody tr {
    border-top: 1px solid #edf2f7;
  }
  .key-table tbody tr:nth-child(even) {
    background: #fcfdff;
  }
  .key-table tbody tr:hover {
    background: #f1f6ff !important;
  }
  .key-label {
    font-size: 1.02rem;
  }
  .key-input {
    font-size: 1.02rem;
  }
  .key-help {
    font-size: 0.92rem;
  }
  .key-table {
    font-size: 1.02rem;
  }
  .key-table thead th {
    font-size: 0.9rem;
  }
  .key-badge {
    font-size: 0.75rem;
  }
  .key-status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 10px;
    border: 1px solid transparent;
    font-size: 0.875rem;
    font-weight: 500;
  }
  .key-status.success {
    color: #166534;
    background: #dcfce7;
    border-color: #86efac;
  }
  .key-status.error {
    color: #b91c1c;
    background: #fee2e2;
    border-color: #fca5a5;
  }
  .key-status.warning {
    color: #92400e;
    background: #fef3c7;
    border-color: #fcd34d;
  }
  .key-status.info {
    color: #1e40af;
    background: #dbeafe;
    border-color: #93c5fd;
  }
</style>

<div class="key-ui flex-1 flex flex-col overflow-hidden">
  <header class="key-glass-header border-b border-gray-200 shadow-sm z-10">
    <div class="max-w-6xl w-full mx-auto h-16 px-6 flex items-center justify-between">
      <h1 class="text-xl font-semibold text-slate-900 flex items-center">
        <span class="inline-flex items-center justify-center h-8 w-8 rounded-xl bg-blue-50 text-blue-600 mr-2">
          <i class="fa fa-key"></i>
        </span>
        SSH 密钥配置
      </h1>
        <span class="hidden md:inline-flex items-center px-3 py-1.5 rounded-full text-sm text-blue-700 bg-blue-50 border border-blue-100">
        一键配置 · 自动验证
      </span>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto key-page-bg p-6 fw-page-main">
    <div class="container mx-auto max-w-6xl space-y-6">
      <section class="key-panel p-6">
        <div class="flex items-start justify-between gap-4 mb-5">
          <div>
            <h2 class="key-panel-title font-semibold">一键配置参数</h2>
            <p class="key-hint mt-1">输入目标主机密码后，系统自动完成：生成密钥、下发公钥、验证密钥登录。</p>
          </div>
          <div class="hidden lg:block text-xs text-gray-500 bg-gray-50 border border-gray-200 rounded-lg px-3 py-2">
            <span class="text-red-500">*</span> 为必填项
          </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 items-end">
          <div class="lg:col-span-4">
            <label for="host-ip" class="key-label block font-medium text-gray-700 mb-1">目标主机 IP <span class="text-red-500">*</span></label>
            <input id="host-ip" type="text" class="key-input key-field h-11 w-full px-3 rounded-xl border" placeholder="">
          </div>

          <div class="lg:col-span-2">
            <label for="ssh-port" class="key-label block font-medium text-gray-700 mb-1">SSH 端口</label>
            <input id="ssh-port" type="number" class="key-input key-field h-11 w-full px-3 rounded-xl border" value="22" min="1" max="65535">
          </div>

          <div class="lg:col-span-3">
            <label for="ssh-username" class="key-label block font-medium text-gray-700 mb-1">SSH 用户名 <span class="text-red-500">*</span></label>
            <input id="ssh-username" type="text" class="key-input key-field h-11 w-full px-3 rounded-xl border" value="root" placeholder="root">
          </div>

          <div class="lg:col-span-3">
            <label class="key-label block font-medium text-gray-700 mb-1">密钥类型</label>
            <input id="key-type" type="hidden" value="ed25519">
            <div class="key-segment h-11 rounded-xl p-1 flex items-center gap-1">
              <button type="button" class="key-segment-btn active h-full flex-1 rounded-lg text-sm font-medium" data-key-type="ed25519">
                ed25519（推荐）
              </button>
              <button type="button" class="key-segment-btn h-full flex-1 rounded-lg text-sm font-medium" data-key-type="rsa">
                rsa
              </button>
            </div>
          </div>

          <div class="lg:col-span-9">
            <label for="ssh-password" class="key-label block font-medium text-gray-700 mb-1">目标主机密码 <span class="text-red-500">*</span></label>
            <div class="relative">
              <input id="ssh-password" type="password" class="key-input key-field h-11 w-full px-3 pr-11 rounded-xl border" placeholder="仅用于自动下发公钥，不会保存到该页面">
              <button id="toggle-password-btn" type="button" class="absolute right-2 top-1/2 -translate-y-1/2 key-btn-subtle h-8 w-8 rounded-lg border text-sm">
                <i id="toggle-password-icon" class="fa fa-eye"></i>
              </button>
            </div>
            <p class="key-help text-gray-500 mt-1">该密码仅用于本次自动下发公钥，页面不会显示或保存明文。</p>
          </div>

          <div class="lg:col-span-3">
            <button id="setup-btn" class="key-btn-primary h-11 w-full rounded-xl font-semibold text-sm">
              一键配置并验证
            </button>
          </div>
        </div>

        <div class="mt-4 min-h-11">
          <div id="setup-status" class="hidden key-status info">
            <i id="setup-status-icon" class="fa fa-info-circle"></i>
            <span id="setup-status-text"></span>
          </div>
        </div>
      </section>

      <section id="result-card" class="hidden key-panel p-6 space-y-4">
        <h2 class="key-panel-title font-semibold">配置结果</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
          <div>
            <div class="text-gray-500 mb-1">私钥保存路径</div>
            <div id="private-key-path" class="key-result-box text-gray-800 break-all px-3 py-2"></div>
          </div>
          <div>
            <div class="text-gray-500 mb-1">公钥保存路径</div>
            <div id="public-key-path" class="key-result-box text-gray-800 break-all px-3 py-2"></div>
          </div>
        </div>

        <div>
          <div class="flex items-center justify-between mb-1">
            <h3 class="font-medium text-sm">私钥（复制到“添加主机 -> SSH密钥”）</h3>
            <button class="copy-btn key-btn-subtle px-3 py-1 text-base rounded-lg" data-target="private-key-text">复制私钥</button>
          </div>
          <textarea id="private-key-text" rows="10" readonly class="w-full px-3 py-2 border border-gray-200 rounded-xl font-mono text-base bg-gray-50"></textarea>
        </div>

        <div>
          <div class="flex items-center justify-between mb-1">
            <h3 class="font-medium text-sm">公钥（已自动下发）</h3>
            <button class="copy-btn key-btn-subtle px-3 py-1 text-base rounded-lg" data-target="public-key-text">复制公钥</button>
          </div>
          <textarea id="public-key-text" rows="3" readonly class="w-full px-3 py-2 border border-gray-200 rounded-xl font-mono text-base bg-gray-50"></textarea>
        </div>
      </section>

      <section class="key-panel p-6">
        <div class="flex flex-col gap-3 mb-4">
          <div class="flex items-center justify-between">
            <h2 class="key-panel-title font-semibold">配置记录</h2>
            <button id="refresh-records-btn" class="key-btn-subtle inline-flex items-center gap-1 px-3 py-1.5 text-sm rounded-lg">
              <i class="fa fa-refresh"></i>
              刷新记录
            </button>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-5 gap-3">
            <input id="records-keyword" type="text" class="key-input key-field lg:col-span-2 h-10 w-full px-3 rounded-xl border" placeholder="搜索：IP / 用户 / 密钥类型">
            <select id="records-status" class="key-input key-field h-10 w-full px-3 rounded-xl border">
              <option value="all">全部状态</option>
              <option value="active">有效</option>
              <option value="revoked">主机公钥已删除</option>
              <option value="setup_failed">配置失败</option>
              <option value="revoke_failed">删除失败</option>
            </select>
            <button id="records-search-btn" class="key-btn-primary h-10 w-full rounded-xl text-sm font-medium">搜索</button>
            <button id="records-clear-btn" class="key-btn-subtle h-10 w-full rounded-xl text-sm">重置</button>
          </div>

          <div class="text-base text-gray-500">共 <span id="records-total">0</span> 条记录</div>
        </div>

        <div class="key-table-wrap">
          <div class="overflow-x-auto">
            <table class="key-table min-w-full text-sm">
              <thead>
                <tr>
                  <th class="px-4 text-left">时间</th>
                  <th class="px-4 text-left">目标主机</th>
                  <th class="px-4 text-left">用户</th>
                  <th class="px-4 text-left">类型</th>
                  <th class="px-4 text-left">状态</th>
                  <th class="px-4 text-right">操作</th>
                </tr>
              </thead>
              <tbody id="records-tbody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </div>
  </main>
</div>
{% endblock main %}

{% block script %}
<script>
  let setupRecords = [];
  let recordsMeta = { total: 0, keyword: '', status: 'all' };
  let currentViewedRecordId = null;
  const CSRF_TOKEN = "{{ csrf_token() }}";

  function getFormData() {
    return {
      host_ip: document.getElementById('host-ip').value.trim(),
      ssh_port: Number(document.getElementById('ssh-port').value || 22),
      username: document.getElementById('ssh-username').value.trim(),
      password: document.getElementById('ssh-password').value,
      key_type: document.getElementById('key-type').value
    };
  }

  function showStatus(text, typeOrIsError = 'success', autoHideMs = 0) {
    const box = document.getElementById('setup-status');
    const textEl = document.getElementById('setup-status-text');
    const iconEl = document.getElementById('setup-status-icon');
    if (!box || !textEl || !iconEl) return;

    if (!text) {
      box.classList.add('hidden');
      textEl.textContent = '';
      return;
    }

    let type = 'success';
    if (typeof typeOrIsError === 'boolean') {
      type = typeOrIsError ? 'error' : 'success';
    } else {
      type = typeOrIsError || 'success';
    }

    const iconMap = {
      success: 'fa-check-circle',
      error: 'fa-times-circle',
      warning: 'fa-exclamation-triangle',
      info: 'fa-info-circle'
    };

    box.classList.remove('hidden', 'success', 'error', 'warning', 'info');
    box.classList.add(type);
    iconEl.classList.remove('fa-check-circle', 'fa-times-circle', 'fa-exclamation-triangle', 'fa-info-circle');
    iconEl.classList.add(iconMap[type] || 'fa-info-circle');
    textEl.textContent = text;

    if (autoHideMs && autoHideMs > 0) {
      window.clearTimeout(window.__setupStatusTimer);
      window.__setupStatusTimer = window.setTimeout(() => {
        box.classList.add('hidden');
      }, autoHideMs);
    }
  }

  function fillResult(data) {
    document.getElementById('private-key-path').textContent = data.private_key_path || '';
    document.getElementById('public-key-path').textContent = data.public_key_path || '';
    document.getElementById('private-key-text').value = data.private_key || '';
    document.getElementById('public-key-text').value = data.public_key || '';
    document.getElementById('result-card').classList.remove('hidden');
  }

  function hideResultCard() {
    document.getElementById('result-card').classList.add('hidden');
    document.getElementById('private-key-path').textContent = '';
    document.getElementById('public-key-path').textContent = '';
    document.getElementById('private-key-text').value = '';
    document.getElementById('public-key-text').value = '';
    currentViewedRecordId = null;
  }

  function fallbackCopyText(text) {
    const tempTextArea = document.createElement('textarea');
    tempTextArea.value = text;
    tempTextArea.style.position = 'fixed';
    tempTextArea.style.left = '-9999px';
    document.body.appendChild(tempTextArea);
    tempTextArea.focus();
    tempTextArea.select();
    try {
      const copied = document.execCommand('copy');
      document.body.removeChild(tempTextArea);
      return copied;
    } catch (error) {
      document.body.removeChild(tempTextArea);
      return false;
    }
  }

  async function copyFromTarget(targetId) {
    const el = document.getElementById(targetId);
    if (!el) return;
    const text = el.value || el.textContent || '';
    if (!text.trim()) {
      showStatus('没有可复制内容', 'warning', 2200);
      return;
    }

    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        showStatus('复制成功', 'success', 1800);
        return;
      }
      const copied = fallbackCopyText(text);
      if (copied) {
        showStatus('复制成功', 'success', 1800);
      } else {
        showStatus('复制失败，请手动复制', 'error');
      }
    } catch (error) {
      const copied = fallbackCopyText(text);
      if (copied) {
        showStatus('复制成功', 'success', 1800);
      } else {
        showStatus('复制失败，请手动复制', 'error');
      }
    }
  }

  function renderRecords() {
    const tbody = document.getElementById('records-tbody');
    if (!tbody) return;
    const totalEl = document.getElementById('records-total');
    if (totalEl) {
      totalEl.textContent = String(recordsMeta.total || 0);
    }
    if (!setupRecords.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="px-3 py-6 text-center text-gray-500">暂无配置记录</td></tr>';
      return;
    }

    tbody.innerHTML = setupRecords.map((record) => {
      let statusLabel = '';
      if (record.setup_status !== 'success') {
        statusLabel = '<span class="inline-flex items-center gap-1 px-2 py-1 text-xs rounded-full bg-red-100 text-red-700"><i class="fa fa-times-circle"></i>配置失败</span>';
      } else if (record.revoke_status === 'revoked') {
        statusLabel = '<span class="inline-flex items-center gap-1 px-2 py-1 text-xs rounded-full bg-gray-100 text-gray-700"><i class="fa fa-ban"></i>主机公钥已删除</span>';
      } else if (record.revoke_status === 'failed') {
        statusLabel = '<span class="inline-flex items-center gap-1 px-2 py-1 text-xs rounded-full bg-yellow-100 text-yellow-700"><i class="fa fa-exclamation-triangle"></i>删除失败</span>';
      } else {
        statusLabel = '<span class="inline-flex items-center gap-1 px-2 py-1 text-xs rounded-full bg-green-100 text-green-700"><i class="fa fa-check-circle"></i>有效</span>';
      }

      const canRemoveTargetKey = record.setup_status === 'success' && record.revoke_status !== 'revoked';
      const canDeleteRecord = record.setup_status !== 'success' || record.revoke_status === 'revoked';
      const deleteRecordTitle = canDeleteRecord
        ? '删除该配置记录'
        : '请先删除目标主机密钥，再删除记录';
      return `
        <tr>
          <td class="px-4 py-3 whitespace-nowrap">${record.created_at || '-'}</td>
          <td class="px-4 py-3 whitespace-nowrap">${record.host_ip || '-'}:${record.ssh_port || 22}</td>
          <td class="px-4 py-3 whitespace-nowrap">${record.target_username || '-'}</td>
          <td class="px-4 py-3 whitespace-nowrap">${record.key_type || '-'}</td>
          <td class="px-4 py-3 whitespace-nowrap">${statusLabel}</td>
          <td class="px-4 py-3 text-right whitespace-nowrap">
            <div class="inline-flex items-center gap-1.5">
              <button class="use-record-btn key-btn-subtle px-2 py-1 text-xs rounded-md" data-record-id="${record.id}" title="查看并加载">
                <i class="fa fa-eye mr-1"></i>查看
              </button>
              <button class="revoke-target-key-btn px-2 py-1 text-xs border border-red-300 text-red-600 rounded-md hover:bg-red-50 disabled:opacity-50" data-record-id="${record.id}" ${canRemoveTargetKey ? '' : 'disabled'}>
                <i class="fa fa-unlink mr-1"></i>删主机密钥
              </button>
              <button class="delete-record-btn key-btn-subtle px-2 py-1 text-xs rounded-md disabled:opacity-50" data-record-id="${record.id}" title="${deleteRecordTitle}" ${canDeleteRecord ? '' : 'disabled'}>
                <i class="fa fa-trash mr-1"></i>删记录
              </button>
            </div>
          </td>
        </tr>
      `;
    }).join('');

    document.querySelectorAll('.use-record-btn').forEach((btn) => {
      btn.addEventListener('click', async function () {
        const recordId = Number(btn.dataset.recordId);
        const record = setupRecords.find(item => item.id === recordId);
        if (!record) return;
        const resultCard = document.getElementById('result-card');
        if (currentViewedRecordId === recordId && resultCard && !resultCard.classList.contains('hidden')) {
          hideResultCard();
          showStatus('已隐藏当前记录详情', 'info', 2200);
          return;
        }
        if (record.setup_status !== 'success') {
          showStatus(record.error_message || '该记录为失败记录，无法加载私钥', true);
          return;
        }
        try {
          const response = await fetch(`/ssh_key_setup_record/${record.id}/private_key`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRF-Token': CSRF_TOKEN
            },
            body: JSON.stringify({})
          });
          const data = await response.json();
          if (!response.ok || !data.success) {
            throw new Error(data.message || '获取私钥失败');
          }
          fillResult(data.data || {});
          currentViewedRecordId = recordId;
          showStatus('已加载当前记录，可直接复制私钥');
        } catch (error) {
          showStatus(error.message || '获取私钥失败', true);
        }
      });
    });

    document.querySelectorAll('.revoke-target-key-btn').forEach((btn) => {
      btn.addEventListener('click', async function () {
        const recordId = Number(btn.dataset.recordId);
        const confirmDelete = window.confirm('确认删除目标主机上的该条公钥吗？\n该操作会保留配置记录，仅删除远端 authorized_keys 中对应公钥。');
        if (!confirmDelete) return;
        btn.disabled = true;
        try {
          const response = await fetch(`/ssh_key_setup_record/${recordId}/remove_target_key`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRF-Token': CSRF_TOKEN
            },
            body: JSON.stringify({})
          });
          const data = await response.json();
          if (!response.ok || !data.success) {
            throw new Error(data.message || '删除目标主机密钥失败');
          }

          showStatus(data.message || '目标主机密钥已删除');
          await loadRecords();
        } catch (error) {
          showStatus(error.message || '删除目标主机密钥失败', true);
        } finally {
          btn.disabled = false;
        }
      });
    });

    document.querySelectorAll('.delete-record-btn').forEach((btn) => {
      btn.addEventListener('click', async function () {
        const recordId = Number(btn.dataset.recordId);
        const record = setupRecords.find(item => item.id === recordId);
        if (!record) return;
        const canDeleteRecord = record.setup_status !== 'success' || record.revoke_status === 'revoked';
        if (!canDeleteRecord) {
          showStatus('请先执行“删除目标主机密钥”，再删除记录', true);
          return;
        }
        const confirmDelete = window.confirm('确认删除该配置记录吗？\n这会删除记录并尝试删除本地密钥文件。');
        if (!confirmDelete) return;
        btn.disabled = true;
        try {
          const response = await fetch(`/ssh_key_setup_record/${recordId}`, {
            method: 'DELETE',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRF-Token': CSRF_TOKEN
            },
            body: JSON.stringify({})
          });
          const data = await response.json();
          if (!response.ok || !data.success) {
            throw new Error(data.message || '删除记录失败');
          }
          showStatus(data.message || '删除记录成功');
          await loadRecords();
        } catch (error) {
          showStatus(error.message || '删除记录失败', true);
        } finally {
          btn.disabled = false;
        }
      });
    });
  }

  async function loadRecords() {
    const keywordEl = document.getElementById('records-keyword');
    const statusEl = document.getElementById('records-status');
    const keyword = (keywordEl && keywordEl.value ? keywordEl.value.trim() : '');
    const status = (statusEl && statusEl.value ? statusEl.value : 'all');
    try {
      const params = new URLSearchParams({
        limit: '50',
        keyword,
        status
      });
      const response = await fetch(`/ssh_key_setup_records?${params.toString()}`);
      const data = await response.json();
      if (!response.ok || !data.success) {
        throw new Error(data.message || '获取配置记录失败');
      }
      setupRecords = Array.isArray(data.data) ? data.data : [];
      recordsMeta = data.meta || { total: setupRecords.length, keyword, status };
      renderRecords();
    } catch (error) {
      showStatus(error.message || '获取配置记录失败', true);
    }
  }

  function setupSegmentedKeyType() {
    const hiddenInput = document.getElementById('key-type');
    const segmentButtons = document.querySelectorAll('.key-segment-btn');
    segmentButtons.forEach((btn) => {
      btn.addEventListener('click', function () {
        const keyType = btn.dataset.keyType;
        hiddenInput.value = keyType;
        segmentButtons.forEach(item => item.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  }

  function setupPasswordToggle() {
    const input = document.getElementById('ssh-password');
    const toggleBtn = document.getElementById('toggle-password-btn');
    const icon = document.getElementById('toggle-password-icon');
    if (!input || !toggleBtn || !icon) return;
    toggleBtn.addEventListener('click', function () {
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      icon.classList.remove('fa-eye', 'fa-eye-slash');
      icon.classList.add(isPassword ? 'fa-eye-slash' : 'fa-eye');
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    setupSegmentedKeyType();
    setupPasswordToggle();

    const setupBtn = document.getElementById('setup-btn');
    const hostIpInput = document.getElementById('host-ip');
    if (hostIpInput) {
      hostIpInput.value = '';
      hostIpInput.setAttribute('autocomplete', 'off');
      hostIpInput.setAttribute('spellcheck', 'false');
    }
    const sshPasswordInput = document.getElementById('ssh-password');
    if (sshPasswordInput) {
      sshPasswordInput.value = '';
      sshPasswordInput.setAttribute('autocomplete', 'new-password');
      sshPasswordInput.setAttribute('spellcheck', 'false');
    }

    setupBtn.addEventListener('click', async function () {
      const formData = getFormData();
      if (!formData.host_ip || !formData.username || !formData.password) {
        showStatus('请填写目标IP、用户名和密码', 'warning');
        return;
      }

      setupBtn.disabled = true;
      const originalText = setupBtn.textContent;
      setupBtn.textContent = '配置中...';
      showStatus('正在生成密钥并安装公钥，请稍候...', 'info');
      try {
        const response = await fetch('/ssh_key_setup', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRF-Token': CSRF_TOKEN
          },
          body: JSON.stringify(formData)
        });
        const data = await response.json();
        if (!response.ok || !data.success) {
          throw new Error(data.message || 'SSH密钥配置失败');
        }
        fillResult(data.data || {});
        showStatus(data.message || 'SSH密钥配置成功');
        await loadRecords();
      } catch (error) {
        showStatus(error.message || 'SSH密钥配置失败', true);
      } finally {
        setupBtn.disabled = false;
        setupBtn.textContent = originalText;
      }
    });

    document.querySelectorAll('.copy-btn').forEach((btn) => {
      btn.addEventListener('click', function () {
        copyFromTarget(btn.dataset.target);
      });
    });

    document.getElementById('refresh-records-btn').addEventListener('click', function () {
      loadRecords();
    });

    document.getElementById('records-search-btn').addEventListener('click', function () {
      loadRecords();
    });

    document.getElementById('records-clear-btn').addEventListener('click', function () {
      document.getElementById('records-keyword').value = '';
      document.getElementById('records-status').value = 'all';
      loadRecords();
    });

    document.getElementById('records-keyword').addEventListener('keydown', function (event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        loadRecords();
      }
    });

    document.getElementById('records-status').addEventListener('change', function () {
      loadRecords();
    });

    showStatus('', 'info');
    loadRecords();
  });
</script>
{% endblock script %}
