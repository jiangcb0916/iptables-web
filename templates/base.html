<!DOCTYPE html>
<html lang="zh-CN" xmlns="http://www.w3.org/1999/html">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>防火墙规则管理系统</title>
  <!-- 引入Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">

  <!-- 配置Tailwind自定义颜色和字体 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#165DFF',
            secondary: '#6B7280',
            success: '#10B981',
            danger: '#EF4444',
            warning: '#F59E0B',
            info: '#3B82F6',
            light: '#F3F4F6',
            dark: '#1F2937'
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      }
    }
  </script>

  <!-- 自定义工具类 -->
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .table-shadow {
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }
      .btn-hover {
        @apply transition-all duration-200 hover:shadow-md transform hover:-translate-y-0.5;
      }
      .sidebar-item {
        @apply flex items-center px-4 py-3 text-gray-700 hover:bg-primary/10 hover:text-primary transition-colors cursor-pointer;
      }
      .sidebar-item.active {
        @apply bg-primary/10 text-primary border-l-4 border-primary;
      }
    }
  </style>
</head>

<body class="bg-gray-50 font-sans text-dark antialiased">
  <div class="flex h-screen overflow-hidden">
    <!-- 侧边栏 -->
    <div class="w-64 bg-white border-r border-gray-200 flex-shrink-0 hidden md:block">
      <div class="p-4 border-b border-gray-200">
        <h2 class="text-xl font-bold text-primary flex items-center">
          <i class="fa fa-shield mr-2"></i> 防火墙管理系统
        </h2>
      </div>

      <div class="h-full overflow-y-auto py-4">
        <nav class="px-2 space-y-1">
          <p class="px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1 mt-4">主菜单</p>

          <div class="sidebar-item">
            <a href="/hosts">
            <i class="fa fa-server w-5 h-5 mr-3"></i>
            <span>主机管理</span>
            </a>
          </div>

          <div class="sidebar-item">
            <a href="/templates">
            <i class="fa fa-firewall fa-list-alt w-5 h-5 mr-3"></i>
            <span>模板管理</span>
            </a>
          </div>

          <p class="px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1 mt-6">系统</p>

          <div class="sidebar-item">
            <a href="/systemseting">
            <i class="fa fa-cog w-5 h-5 mr-3"></i>
            <span>系统设置</span>
            </a>
          </div>

          <div class="sidebar-item">
            <a href="/logs">
            <i class="fa fa-history w-5 h-5 mr-3"></i>
            <span>操作日志</span>
            </a>
          </div>
        </nav>
      </div>
    </div>

<!-- 主内容区 -->
{% block main %}
{% endblock main %}

<!-- js -->
{% block script %}
{% endblock script %}

<script>
// 页面加载完成后执行
document.addEventListener('DOMContentLoaded', function() {
  // 1. 获取当前页面的URL路径（如 "/hosts"、"/templates"）
  const currentUrl = window.location.pathname;

  // 2. 获取所有侧边栏按钮（.sidebar-item）
  const sidebarItems = document.querySelectorAll('.sidebar-item');

  // 3. 遍历每个按钮，判断是否匹配当前URL
  sidebarItems.forEach(item => {
    // 获取按钮内的链接（<a>标签）的href属性
    const linkHref = item.querySelector('a').getAttribute('href');

    // 如果链接的href与当前页面URL一致，则添加active类，否则移除
    if (currentUrl === linkHref) {
      item.classList.add('active');
    } else {
      item.classList.remove('active');
    }
  });
});
</script>
</body>
</html>
