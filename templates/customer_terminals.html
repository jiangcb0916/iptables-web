{% extends 'base.html' %}
{% block main %}
<style type="text/tailwindcss">
  @layer utilities {
    .sidebar-item {
      @apply flex items-center px-4 py-3 text-gray-700 hover:bg-primary/10 hover:text-primary transition-colors cursor-pointer;
    }
    .sidebar-item.active {
      @apply bg-primary/10 text-primary border-l-4 border-primary;
    }
  }
</style>
<div class="flex-1 flex flex-col overflow-hidden">
  <header class="bg-white border-b border-gray-200 shadow-sm z-10">
    <div class="flex items-center justify-between h-16 px-6">
      <div class="flex-1 max-w-md mx-4">
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
            <i class="fa fa-search"></i>
          </span>
          <input id="keyword-input" type="text"
                 class="block w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md bg-white focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary sm:text-sm"
                 placeholder="搜索姓名、手机号、IP地址">
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button id="refresh-btn" class="fw-btn-outline px-4 py-2 text-sm font-medium">
          <i class="fa fa-refresh mr-1"></i> 刷新
        </button>
        <details id="export-menu" class="relative group">
          <summary class="fw-btn-primary px-4 py-2 text-sm font-medium list-none cursor-pointer select-none flex items-center gap-1 [&::-webkit-details-marker]:hidden">
            <i class="fa fa-download"></i>
            导出 CSV
            <i class="fa fa-caret-down text-xs opacity-90"></i>
          </summary>
          <div class="absolute right-0 mt-2 w-56 rounded-md border border-gray-200 bg-white py-1 shadow-lg z-20">
            <button type="button" id="export-page-btn"
                    class="w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 flex flex-col gap-0.5">
              <span class="font-medium">导出当前页</span>
              <span class="text-xs text-secondary" id="export-page-hint">当前列表中的记录</span>
            </button>
            <div class="border-t border-gray-100"></div>
            <button type="button" id="export-all-btn"
                    class="w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 flex flex-col gap-0.5">
              <span class="font-medium">导出全部</span>
              <span class="text-xs text-secondary" id="export-all-hint">含搜索筛选后的全部记录</span>
            </button>
          </div>
        </details>
      </div>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto bg-gray-50 p-6 fw-page-main">
    <div class="container mx-auto max-w-7xl">
      <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 fw-page-hero">
        <div>
          <h1 class="fw-page-title">客户终端列表</h1>
          <!-- <p class="fw-page-subtitle">展示准入 API 返回的终端姓名、手机号、IP与在线状态</p> -->
        </div>
      </div>

      <div id="alert-box" class="hidden mb-4 rounded-lg px-4 py-3 text-sm"></div>

      <div class="fw-table-wrap">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-6 py-4 text-left text-xs font-semibold text-secondary uppercase tracking-wider">姓名</th>
              <th class="px-6 py-4 text-left text-xs font-semibold text-secondary uppercase tracking-wider">手机号</th>
              <th class="px-6 py-4 text-left text-xs font-semibold text-secondary uppercase tracking-wider">IP地址</th>
              <th class="px-6 py-4 text-left text-xs font-semibold text-secondary uppercase tracking-wider">状态</th>
            </tr>
          </thead>
          <tbody id="customer-terminal-body" class="bg-white divide-y divide-gray-200"></tbody>
        </table>

        <div class="px-6 py-4 bg-gray-50 border-t border-gray-200 flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
          <div id="page-summary" class="text-sm text-secondary">显示 0 到 0 条，共 0 条</div>
          <div class="flex flex-wrap items-center gap-2 lg:justify-end">
            <label class="text-sm text-secondary inline-flex items-center gap-2">
              每页
              <select id="page-size-select"
                      class="rounded border border-gray-300 bg-white px-2 py-1.5 text-sm text-dark focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary">
                <option value="10">10</option>
                <option value="20">20</option>
                <option value="50">50</option>
                <option value="100">100</option>
              </select>
              条
            </label>
            <div class="hidden sm:block w-px h-6 bg-gray-200" aria-hidden="true"></div>
            <button id="prev-btn" type="button" class="px-3 py-1.5 rounded border border-gray-300 bg-white text-secondary hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed" title="上一页">
              <i class="fa fa-chevron-left"></i>
            </button>
            <span id="page-indicator" class="text-sm text-secondary tabular-nums min-w-[5.5rem] text-center">第 1 / 1 页</span>
            <button id="next-btn" type="button" class="px-3 py-1.5 rounded border border-gray-300 bg-white text-secondary hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed" title="下一页">
              <i class="fa fa-chevron-right"></i>
            </button>
            <div class="hidden sm:block w-px h-6 bg-gray-200" aria-hidden="true"></div>
            <span class="text-sm text-secondary">跳转</span>
            <input id="page-jump-input" type="number" min="1" inputmode="numeric"
                   class="w-16 rounded border border-gray-300 bg-white px-2 py-1.5 text-sm text-dark focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary"
                   placeholder="页码" aria-label="页码">
            <button id="page-jump-btn" type="button" class="fw-btn-outline px-3 py-1.5 text-sm font-medium">
              确定
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
{% endblock main %}

{% block script %}
<script>
  const EXPORT_BATCH_SIZE = 200;

  const state = {
    items: [],
    total: 0,
    page: 1,
    pageSize: 10,
    keyword: ''
  };

  const bodyEl = document.getElementById('customer-terminal-body');
  const pageSummaryEl = document.getElementById('page-summary');
  const pageIndicatorEl = document.getElementById('page-indicator');
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  const pageSizeSelect = document.getElementById('page-size-select');
  const pageJumpInput = document.getElementById('page-jump-input');
  const pageJumpBtn = document.getElementById('page-jump-btn');
  const keywordInput = document.getElementById('keyword-input');
  const refreshBtn = document.getElementById('refresh-btn');
  const exportMenu = document.getElementById('export-menu');
  const exportPageBtn = document.getElementById('export-page-btn');
  const exportAllBtn = document.getElementById('export-all-btn');
  const exportPageHint = document.getElementById('export-page-hint');
  const exportAllHint = document.getElementById('export-all-hint');
  const alertBox = document.getElementById('alert-box');

  function closeExportMenu() {
    if (exportMenu) exportMenu.removeAttribute('open');
  }

  function showAlert(message, type = 'error') {
    const baseClass = 'mb-4 rounded-lg px-4 py-3 text-sm';
    const typeClass = type === 'error'
      ? 'bg-red-50 text-red-700 border border-red-200'
      : 'bg-blue-50 text-blue-700 border border-blue-200';
    alertBox.className = `${baseClass} ${typeClass}`;
    alertBox.textContent = message;
    alertBox.classList.remove('hidden');
  }

  function clearAlert() {
    alertBox.classList.add('hidden');
    alertBox.textContent = '';
  }

  function renderRows() {
    if (!state.items.length) {
      bodyEl.innerHTML = `
        <tr>
          <td colspan="4" class="px-6 py-12 text-center">
            <div class="text-base font-semibold text-gray-700 mb-1">暂无客户终端数据</div>
            <div class="text-sm text-secondary">无有效数据</div>
          </td>
        </tr>
      `;
      return;
    }

    bodyEl.innerHTML = state.items.map(item => `
      <tr class="hover:bg-gray-50 transition-colors">
        <td class="px-6 py-4 whitespace-nowrap text-sm text-dark">${item.name || '未知'}</td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-secondary">${item.phone || '-'}</td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-secondary">${item.ip || '-'}</td>
        <td class="px-6 py-4 whitespace-nowrap text-sm">
          ${renderStatusBadge(item.status, item.status_text)}
        </td>
      </tr>
    `).join('');
  }

  function renderStatusBadge(status, statusText) {
    const text = statusText || '未知';
    if (status === 'online') {
      return '<span class="px-2 py-1 text-xs rounded-full bg-green-100 text-success">在线</span>';
    }
    if (status === 'offline') {
      return '<span class="px-2 py-1 text-xs rounded-full bg-red-100 text-danger">离线</span>';
    }
    if (status === 'uninstalled') {
      return '<span class="px-2 py-1 text-xs rounded-full bg-yellow-100 text-yellow-700">未装助手</span>';
    }
    return `<span class="px-2 py-1 text-xs rounded-full bg-gray-100 text-gray-600">${text}</span>`;
  }

  function renderPagination() {
    const totalPages = Math.max(1, Math.ceil(state.total / state.pageSize));
    const start = state.total ? (state.page - 1) * state.pageSize + 1 : 0;
    const end = state.total ? Math.min(state.page * state.pageSize, state.total) : 0;
    pageSummaryEl.textContent = `显示 ${start} 到 ${end} 条，共 ${state.total} 条`;
    pageIndicatorEl.textContent = `第 ${state.page} / ${totalPages} 页`;
    prevBtn.disabled = state.page <= 1;
    nextBtn.disabled = state.page >= totalPages;
    if (pageJumpInput) {
      pageJumpInput.max = String(totalPages);
      pageJumpInput.placeholder = `1-${totalPages}`;
      if (document.activeElement !== pageJumpInput) {
        pageJumpInput.value = String(state.page);
      }
    }
    if (pageSizeSelect && String(pageSizeSelect.value) !== String(state.pageSize)) {
      pageSizeSelect.value = String(state.pageSize);
    }
    if (exportPageHint) {
      exportPageHint.textContent = state.items.length
        ? `本页 ${state.items.length} 条`
        : '当前页无可导出记录';
    }
    if (exportAllHint) {
      exportAllHint.textContent = state.total
        ? `共 ${state.total} 条（与当前搜索条件一致）`
        : '暂无数据';
    }
  }

  async function loadData() {
    clearAlert();
    refreshBtn.disabled = true;
    refreshBtn.innerHTML = '<i class="fa fa-spinner fa-spin mr-1"></i> 刷新中';
    try {
      const params = new URLSearchParams({
        page: String(state.page),
        page_size: String(state.pageSize),
        keyword: state.keyword
      });
      const response = await fetch(`/api/customer-terminals?${params.toString()}`);
      const data = await response.json();
      if (!response.ok || !data.success) {
        throw new Error(data.message || '获取客户终端列表失败，请检查联软准入接口');
      }
      state.items = Array.isArray(data.items) ? data.items : [];
      state.total = Number(data.total || 0);
      const totalPages = Math.max(1, Math.ceil(state.total / state.pageSize));
      if (state.page > totalPages) {
        state.page = totalPages;
        return await loadData();
      }
      renderRows();
      renderPagination();
      const dtHint = data.dingtalk && data.dingtalk.hint;
      if (dtHint) {
        showAlert(dtHint, 'info');
      } else if (!state.items.length) {
        showAlert('无有效数据', 'info');
      }
    } catch (error) {
      state.items = [];
      state.total = 0;
      renderRows();
      renderPagination();
      showAlert(error.message || '获取客户终端列表失败，请检查联软准入接口', 'error');
    } finally {
      refreshBtn.disabled = false;
      refreshBtn.innerHTML = '<i class="fa fa-refresh mr-1"></i> 刷新';
    }
  }

  function buildCsvFromItems(items) {
    const header = ['姓名', '手机号', 'IP地址', '状态'];
    const lines = [header.join(',')];
    items.forEach(item => {
      const row = [item.name || '', item.phone || '', item.ip || '', item.status_text || '未知']
        .map(value => `"${String(value).replace(/"/g, '""')}"`);
      lines.push(row.join(','));
    });
    return lines.join('\n');
  }

  function downloadCsv(text, suffix) {
    const blob = new Blob([`\ufeff${text}`], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    const now = new Date();
    const stamp = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}_${String(now.getHours()).padStart(2, '0')}${String(now.getMinutes()).padStart(2, '0')}${String(now.getSeconds()).padStart(2, '0')}`;
    link.href = URL.createObjectURL(blob);
    link.download = `customer_terminals_${suffix}_${stamp}.csv`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(link.href);
  }

  function exportCurrentRowsToCsv() {
    if (!state.items.length) {
      showAlert('当前页无可导出数据', 'info');
      return;
    }
    downloadCsv(buildCsvFromItems(state.items), 'page');
    closeExportMenu();
  }

  async function fetchAllItemsForExport() {
    const allItems = [];
    let page = 1;
    let total = 0;
    for (let guard = 0; guard < 500; guard += 1) {
      const params = new URLSearchParams({
        page: String(page),
        page_size: String(EXPORT_BATCH_SIZE),
        keyword: state.keyword
      });
      const response = await fetch(`/api/customer-terminals?${params.toString()}`);
      const data = await response.json();
      if (!response.ok || !data.success) {
        throw new Error(data.message || '获取客户终端列表失败');
      }
      const chunk = Array.isArray(data.items) ? data.items : [];
      total = Number(data.total || 0);
      allItems.push(...chunk);
      if (allItems.length >= total || chunk.length === 0) {
        break;
      }
      page += 1;
    }
    return allItems;
  }

  async function exportAllRowsToCsv() {
    if (!state.total) {
      showAlert('没有可导出的数据', 'info');
      closeExportMenu();
      return;
    }
    exportAllBtn.disabled = true;
    exportPageBtn.disabled = true;
    try {
      showAlert('正在拉取全部数据用于导出，请稍候…', 'info');
      const allItems = await fetchAllItemsForExport();
      if (!allItems.length) {
        showAlert('没有可导出的数据', 'info');
        closeExportMenu();
        return;
      }
      clearAlert();
      downloadCsv(buildCsvFromItems(allItems), 'all');
      closeExportMenu();
    } catch (error) {
      showAlert(error.message || '导出全部失败', 'error');
    } finally {
      exportAllBtn.disabled = false;
      exportPageBtn.disabled = false;
    }
  }

  let keywordTimer = null;
  keywordInput.addEventListener('input', (event) => {
    clearTimeout(keywordTimer);
    keywordTimer = setTimeout(() => {
      state.keyword = event.target.value.trim();
      state.page = 1;
      loadData();
    }, 300);
  });

  prevBtn.addEventListener('click', () => {
    if (state.page <= 1) return;
    state.page -= 1;
    loadData();
  });

  nextBtn.addEventListener('click', () => {
    const totalPages = Math.max(1, Math.ceil(state.total / state.pageSize));
    if (state.page >= totalPages) return;
    state.page += 1;
    loadData();
  });

  refreshBtn.addEventListener('click', () => loadData());
  exportPageBtn.addEventListener('click', () => exportCurrentRowsToCsv());
  exportAllBtn.addEventListener('click', () => exportAllRowsToCsv());

  pageSizeSelect.addEventListener('change', (event) => {
    const next = Number(event.target.value);
    if (!Number.isFinite(next) || next <= 0) return;
    state.pageSize = next;
    state.page = 1;
    loadData();
  });

  function goToPageInput() {
    const totalPages = Math.max(1, Math.ceil(state.total / state.pageSize));
    let target = parseInt(pageJumpInput.value, 10);
    if (!Number.isFinite(target)) {
      showAlert('请输入有效页码', 'info');
      return;
    }
    target = Math.min(Math.max(1, target), totalPages);
    state.page = target;
    pageJumpInput.value = String(target);
    loadData();
  }

  pageJumpBtn.addEventListener('click', goToPageInput);
  pageJumpInput.addEventListener('keydown', (event) => {
    if (event.key === 'Enter') {
      event.preventDefault();
      goToPageInput();
    }
  });

  document.addEventListener('click', (event) => {
    if (!exportMenu || !exportMenu.open) return;
    if (exportMenu.contains(event.target)) return;
    closeExportMenu();
  });

  document.addEventListener('DOMContentLoaded', () => {
    pageSizeSelect.value = String(state.pageSize);
    loadData();
  });
</script>
{% endblock script %}
