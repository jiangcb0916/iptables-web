{% extends 'base.html' %}
{% block main %}
<div class="flex-1 flex flex-col overflow-hidden">
  <header class="bg-white border-b border-gray-200 shadow-sm z-10">
    <div class="flex items-center justify-between h-16 px-6">
      <div class="text-lg font-semibold text-dark">访问来源透视</div>
      <button class="text-gray-500 hover:text-gray-700 relative" onclick="window.location.href='/logout'">
        <span class="flex items-center">
          <i class="fa fa-sign-out text-xl mr-1"></i>
          <span class="text-sm">退出登录</span>
        </span>
      </button>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto bg-gray-50 p-6">
    <div class="container mx-auto max-w-7xl space-y-6">
      <div class="fw-page-hero">
        <div class="fw-page-title">谁在访问这台服务器？</div>
        <p class="fw-page-subtitle">
          通过 SSH 在目标主机执行 <code class="text-sm bg-slate-100 px-1 rounded">ss</code> 列出当前已建立连接；若可用
          <code class="text-sm bg-slate-100 px-1 rounded">conntrack</code>，则尝试补齐每条流的包量与字节数（通常需 root 与 nf_conntrack）。
        </p>
      </div>

      <div class="bg-white rounded-xl border border-gray-200 p-5">
        <h2 class="text-base font-semibold text-dark mb-4">查询条件</h2>
        <div class="flex flex-wrap items-end gap-4">
          <div class="min-w-[240px] flex-1">
            <label class="block text-sm text-gray-700 mb-1">目标主机 <span class="text-red-500">*</span></label>
            <select id="host-select" class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm">
              <option value="">请选择主机</option>
              {% for host in host_options %}
              <option value="{{ host.id }}" data-ip="{{ host.ip_address }}">{{ host.host_name }} ({{ host.ip_address }})</option>
              {% endfor %}
            </select>
          </div>
          <div class="flex items-center gap-2">
            <button id="refresh-btn" type="button" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-primary/90 text-sm">
              <i class="fa fa-refresh mr-1"></i>立即刷新
            </button>
            <label class="inline-flex items-center gap-2 text-sm text-gray-600">
              <input id="auto-refresh" type="checkbox" class="rounded border-gray-300 text-primary focus:ring-primary">
              每 20 秒自动刷新
            </label>
          </div>
        </div>
        <div id="status-bar" class="mt-3 text-sm text-gray-500">请选择主机后点击刷新。</div>
        <div id="notice-box" class="mt-3 hidden space-y-1 text-xs text-amber-800 bg-amber-50 border border-amber-100 rounded-lg px-3 py-2"></div>
        <div id="meta-bar" class="mt-3 hidden flex flex-wrap gap-2 text-xs"></div>
      </div>

      <div class="bg-white rounded-xl border border-gray-200 p-5">
        <div class="flex flex-wrap items-center justify-between gap-3 mb-3">
          <h2 class="text-base font-semibold text-dark">连接列表</h2>
          <input id="filter-input" type="text" class="w-full md:w-72 px-3 py-2 border border-gray-300 rounded-md text-sm" placeholder="过滤：来源 IP、端口、本机端口、协议…">
        </div>
        <div class="overflow-x-auto fw-table-wrap rounded-lg border border-gray-200">
          <table class="min-w-full divide-y divide-gray-200">
            <thead>
              <tr>
                <th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wide">来源 IP</th>
                <th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wide">范围</th>
                <th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wide">源端口</th>
                <th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wide">本机 IP</th>
                <th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wide">目标端口</th>
                <th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wide">协议</th>
                <th class="px-3 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wide">包数</th>
                <th class="px-3 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wide">字节</th>
                <th class="px-3 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wide" title="内核接收/发送队列，非累计流量">队列 R/S</th>
              </tr>
            </thead>
            <tbody id="conn-body" class="bg-white divide-y divide-gray-100 text-sm">
              <tr><td colspan="9" class="px-4 py-10 text-center text-gray-500">暂无数据</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>
{% endblock main %}

{% block script %}
<script>
(function () {
  const scopeMap = {
    loopback: { text: '回环', cls: 'bg-slate-100 text-slate-700 border-slate-200' },
    private: { text: '内网', cls: 'bg-blue-50 text-blue-800 border-blue-100' },
    public: { text: '公网', cls: 'bg-orange-50 text-orange-800 border-orange-100' },
    link_local: { text: '链路本地', cls: 'bg-violet-50 text-violet-800 border-violet-100' },
    multicast: { text: '组播', cls: 'bg-fuchsia-50 text-fuchsia-800 border-fuchsia-100' },
    unknown: { text: '未知', cls: 'bg-gray-100 text-gray-700 border-gray-200' }
  };

  const hostSelect = document.getElementById('host-select');
  const refreshBtn = document.getElementById('refresh-btn');
  const statusBar = document.getElementById('status-bar');
  const noticeBox = document.getElementById('notice-box');
  const metaBar = document.getElementById('meta-bar');
  const connBody = document.getElementById('conn-body');
  const filterInput = document.getElementById('filter-input');
  const autoRefresh = document.getElementById('auto-refresh');

  let latestRows = [];
  let autoTimer = null;

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function scopeBadge(scope) {
    const m = scopeMap[scope] || scopeMap.unknown;
    return `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs border ${m.cls}">${escapeHtml(m.text)}</span>`;
  }

  function formatNum(n) {
    if (n === null || n === undefined) return '—';
    if (typeof n !== 'number') return '—';
    return n.toLocaleString();
  }

  function renderNotices(list) {
    if (!list || !list.length) {
      noticeBox.classList.add('hidden');
      noticeBox.innerHTML = '';
      return;
    }
    noticeBox.classList.remove('hidden');
    noticeBox.innerHTML = list.map((t) => `<div>• ${escapeHtml(t)}</div>`).join('');
  }

  function renderMeta(data) {
    metaBar.classList.remove('hidden');
    const chips = [
      { label: '采集时间', val: data.collected_at || '—', color: 'bg-slate-50 text-slate-800 border-slate-200' },
      { label: '连接条数', val: String(data.row_count ?? 0), color: 'bg-blue-50 text-blue-800 border-blue-100' },
      { label: 'conntrack 对齐', val: `${data.conntrack_stats_matched ?? 0} 条`, color: 'bg-emerald-50 text-emerald-800 border-emerald-100' }
    ];
    metaBar.innerHTML = chips
      .map(
        (c) =>
          `<span class="inline-flex items-center px-2 py-1 rounded-full border text-xs ${c.color}">${escapeHtml(c.label)}：${escapeHtml(c.val)}</span>`
      )
      .join('');
  }

  function rowMatchesFilter(row, q) {
    if (!q) return true;
    const hay = [
      row.peer_ip,
      row.peer_port,
      row.local_ip,
      row.local_port,
      row.protocol,
      row.peer_scope,
      row.packets,
      row.bytes
    ]
      .join(' ')
      .toLowerCase();
    return hay.includes(q);
  }

  function renderTable() {
    const q = (filterInput.value || '').trim().toLowerCase();
    const rows = latestRows.filter((r) => rowMatchesFilter(r, q));
    if (!rows.length) {
      connBody.innerHTML =
        '<tr><td colspan="9" class="px-4 py-10 text-center text-gray-500">' +
        (latestRows.length ? '无匹配结果' : '暂无数据') +
        '</td></tr>';
      return;
    }
    connBody.innerHTML = rows
      .map((r) => {
        return `<tr class="hover:bg-slate-50/80">
          <td class="px-3 py-2 font-mono text-xs">${escapeHtml(String(r.peer_ip))}</td>
          <td class="px-3 py-2">${scopeBadge(r.peer_scope)}</td>
          <td class="px-3 py-2 font-mono text-xs">${escapeHtml(String(r.peer_port))}</td>
          <td class="px-3 py-2 font-mono text-xs">${escapeHtml(String(r.local_ip))}</td>
          <td class="px-3 py-2 font-mono text-xs font-semibold text-slate-800">${escapeHtml(String(r.local_port))}</td>
          <td class="px-3 py-2 uppercase text-xs">${escapeHtml(String(r.protocol))}</td>
          <td class="px-3 py-2 text-right font-mono text-xs">${escapeHtml(formatNum(r.packets))}</td>
          <td class="px-3 py-2 text-right font-mono text-xs">${escapeHtml(formatNum(r.bytes))}</td>
          <td class="px-3 py-2 text-right font-mono text-xs text-gray-500" title="Recv-Q / Send-Q">${r.recv_q}/${r.send_q}</td>
        </tr>`;
      })
      .join('');
  }

  async function loadData() {
    const hostId = hostSelect.value;
    if (!hostId) {
      statusBar.textContent = '请先选择主机。';
      return;
    }
    refreshBtn.disabled = true;
    statusBar.textContent = '正在通过 SSH 采集，请稍候…';
    renderNotices([]);
    try {
      const res = await fetch('/api/host-connection-insight?host_id=' + encodeURIComponent(hostId));
      const data = await res.json();
      if (!res.ok || !data.success) throw new Error(data.message || '请求失败');
      latestRows = data.connections || [];
      const opt = hostSelect.options[hostSelect.selectedIndex];
      const name = opt ? opt.textContent : '';
      statusBar.textContent = `已更新：${name}`;
      renderMeta(data);
      renderNotices(data.notices || []);
      renderTable();
    } catch (e) {
      latestRows = [];
      statusBar.textContent = e.message || '加载失败';
      metaBar.classList.add('hidden');
      connBody.innerHTML =
        '<tr><td colspan="9" class="px-4 py-10 text-center text-red-600">' + escapeHtml(e.message || '加载失败') + '</td></tr>';
    } finally {
      refreshBtn.disabled = false;
    }
  }

  refreshBtn.addEventListener('click', loadData);
  filterInput.addEventListener('input', () => renderTable());

  autoRefresh.addEventListener('change', () => {
    if (autoTimer) {
      clearInterval(autoTimer);
      autoTimer = null;
    }
    if (autoRefresh.checked) {
      autoTimer = setInterval(() => {
        if (hostSelect.value) loadData();
      }, 20000);
    }
  });

  hostSelect.addEventListener('change', () => {
    latestRows = [];
    renderTable();
    if (hostSelect.value) loadData();
  });
})();
</script>
{% endblock script %}
