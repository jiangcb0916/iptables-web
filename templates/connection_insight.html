{% extends 'base.html' %}
{% block main %}
<div class="flex-1 flex flex-col overflow-hidden">
  <header class="bg-white border-b border-gray-200 shadow-sm z-10">
    <div class="flex items-center justify-between h-16 px-6">
      <div class="text-lg font-semibold text-dark">访问来源透视</div>
      <button class="text-gray-500 hover:text-gray-700 relative" onclick="window.location.href='/logout'">
        <span class="flex items-center">
          <i class="fa fa-sign-out text-xl mr-1"></i>
          <span class="text-sm">退出登录</span>
        </span>
      </button>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto bg-gray-50 p-6">
    <div class="container mx-auto max-w-7xl space-y-6">
      <!-- 与端口检测页一致：白卡片 + rounded-xl -->
      <div class="bg-white rounded-xl border border-gray-200 p-5 shadow-sm">
        <h2 class="text-base font-semibold text-dark mb-4 flex items-center gap-2">
          <i class="fa fa-sliders text-primary"></i>
          查询条件
        </h2>
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 items-end">
          <div class="lg:col-span-5">
            <label class="block text-sm text-gray-700 mb-1">目标主机 <span class="text-red-500">*</span></label>
            <select id="host-select" class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary bg-white">
              <option value="">请选择主机</option>
              {% for host in host_options %}
              <option value="{{ host.id }}" data-ip="{{ host.ip_address }}">{{ host.host_name }} ({{ host.ip_address }})</option>
              {% endfor %}
            </select>
          </div>
          <div class="lg:col-span-7 flex flex-wrap items-center gap-3">
            <button id="refresh-btn" type="button" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-primary/90 text-sm inline-flex items-center gap-1.5 shadow-sm">
              <i class="fa fa-refresh"></i>
              立即刷新
            </button>
            <label class="inline-flex items-center gap-2 text-sm text-gray-600 cursor-pointer select-none">
              <input id="auto-refresh" type="checkbox" class="rounded border-gray-300 text-primary focus:ring-primary">
              每 20 秒自动刷新
            </label>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-gray-200 p-5 shadow-sm">
        <div class="flex flex-wrap items-start justify-between gap-3 mb-4">
          <div class="min-w-0 flex-1">
            <h2 class="text-base font-semibold text-dark flex items-center gap-2">
              <i class="fa fa-list-alt text-primary"></i>
              连接列表
            </h2>
            <p id="status-bar" class="text-xs text-gray-500 mt-1.5">请选择主机后将自动刷新，也可点击「立即刷新」。</p>
            <div id="meta-bar" class="mt-2 hidden flex flex-wrap items-center gap-2 text-xs"></div>
          </div>
        </div>

        <div class="mb-3 flex flex-wrap items-center gap-3">
          <input id="filter-input" type="text" class="w-full md:w-80 px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary" placeholder="过滤：来源 IP、端口、本机端口、协议…">
          <span id="result-count" class="text-xs text-gray-500 whitespace-nowrap">共 0 条</span>
        </div>

        <div class="overflow-x-auto border border-gray-200 rounded-lg">
          <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-4 py-3 text-left text-xs text-secondary uppercase tracking-wide font-medium">来源 IP</th>
                <th class="px-4 py-3 text-left text-xs text-secondary uppercase tracking-wide font-medium">范围</th>
                <th class="px-4 py-3 text-left text-xs text-secondary uppercase tracking-wide font-medium">源端口</th>
                <th class="px-4 py-3 text-left text-xs text-secondary uppercase tracking-wide font-medium">本机 IP</th>
                <th class="px-4 py-3 text-left text-xs text-secondary uppercase tracking-wide font-medium">目标端口</th>
                <th class="px-4 py-3 text-left text-xs text-secondary uppercase tracking-wide font-medium">协议</th>
                <th class="px-4 py-3 text-right text-xs text-secondary uppercase tracking-wide font-medium">包数</th>
                <th class="px-4 py-3 text-right text-xs text-secondary uppercase tracking-wide font-medium">字节</th>
                <th class="px-4 py-3 text-right text-xs text-secondary uppercase tracking-wide font-medium">队列 R/S</th>
              </tr>
            </thead>
            <tbody id="conn-body" class="bg-white divide-y divide-gray-200 text-sm">
              <tr>
                <td colspan="9" class="px-4 py-14 text-center">
                  <div class="inline-flex flex-col items-center gap-2 text-gray-500">
                    <span class="flex h-12 w-12 items-center justify-center rounded-full bg-slate-100 text-slate-400">
                      <i class="fa fa-exchange text-lg"></i>
                    </span>
                    <span class="text-sm">暂无数据，请选择主机后刷新</span>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>
{% endblock main %}

{% block script %}
<script>
(function () {
  const scopeMap = {
    loopback: { text: '本机', cls: 'bg-slate-100 text-slate-700 border-slate-200' },
    private: { text: '内网', cls: 'bg-blue-50 text-blue-800 border-blue-100' },
    public: { text: '公网', cls: 'bg-orange-50 text-orange-800 border-orange-100' },
    link_local: { text: '链路本地', cls: 'bg-violet-50 text-violet-800 border-violet-100' },
    multicast: { text: '组播', cls: 'bg-fuchsia-50 text-fuchsia-800 border-fuchsia-100' },
    unknown: { text: '未知', cls: 'bg-gray-100 text-gray-700 border-gray-200' }
  };

  const hostSelect = document.getElementById('host-select');
  const refreshBtn = document.getElementById('refresh-btn');
  const statusBar = document.getElementById('status-bar');
  const metaBar = document.getElementById('meta-bar');
  const connBody = document.getElementById('conn-body');
  const filterInput = document.getElementById('filter-input');
  const autoRefresh = document.getElementById('auto-refresh');
  const resultCount = document.getElementById('result-count');

  let latestRows = [];
  let autoTimer = null;

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function scopeBadge(scope) {
    const m = scopeMap[scope] || scopeMap.unknown;
    return `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs border font-medium ${m.cls}">${escapeHtml(m.text)}</span>`;
  }

  function protoBadge(p) {
    const u = String(p || '').toLowerCase();
    if (u === 'tcp') {
      return '<span class="inline-flex items-center px-2 py-0.5 rounded-md text-xs font-semibold bg-sky-50 text-sky-800 border border-sky-100">TCP</span>';
    }
    return '<span class="inline-flex items-center px-2 py-0.5 rounded-md text-xs font-semibold bg-violet-50 text-violet-800 border border-violet-100">UDP</span>';
  }

  function formatNum(n) {
    if (n === null || n === undefined) return '—';
    if (typeof n !== 'number') return '—';
    return n.toLocaleString();
  }

  function renderMeta(data) {
    metaBar.classList.remove('hidden');
    const chips = [
      { label: '采集时间', val: data.collected_at || '—', cls: 'px-2 py-1 rounded-full bg-amber-50 text-amber-800 border border-amber-100' },
      { label: '连接条数', val: String(data.row_count ?? 0), cls: 'px-2 py-1 rounded-full bg-blue-50 text-blue-800 border border-blue-100' },
      { label: 'conntrack 对齐', val: `${data.conntrack_stats_matched ?? 0} 条`, cls: 'px-2 py-1 rounded-full bg-emerald-50 text-emerald-800 border border-emerald-100' }
    ];
    metaBar.innerHTML = chips
      .map((c) => `<span class="inline-flex items-center text-xs font-medium ${c.cls}">${escapeHtml(c.label)}：${escapeHtml(c.val)}</span>`)
      .join('');
  }

  function rowMatchesFilter(row, q) {
    if (!q) return true;
    const hay = [
      row.peer_ip,
      row.peer_port,
      row.local_ip,
      row.local_port,
      row.protocol,
      row.peer_scope,
      row.packets,
      row.bytes
    ]
      .join(' ')
      .toLowerCase();
    return hay.includes(q);
  }

  function updateResultCount(visible, total) {
    if (!resultCount) return;
    const q = (filterInput.value || '').trim();
    if (q && total > 0) {
      resultCount.textContent = `显示 ${visible} / 共 ${total} 条`;
    } else {
      resultCount.textContent = `共 ${total} 条`;
    }
  }

  function emptyStateHtml(message, isError) {
    const icon = isError ? 'fa-exclamation-circle' : 'fa-exchange';
    const color = isError ? 'text-red-500 bg-red-50' : 'text-slate-400 bg-slate-100';
    const textCls = isError ? 'text-red-600' : 'text-gray-500';
    return `<tr><td colspan="9" class="px-4 py-14 text-center">
      <div class="inline-flex flex-col items-center gap-2 ${textCls}">
        <span class="flex h-12 w-12 items-center justify-center rounded-full ${color}">
          <i class="fa ${icon} text-lg"></i>
        </span>
        <span class="text-sm">${escapeHtml(message)}</span>
      </div>
    </td></tr>`;
  }

  function renderTable() {
    const q = (filterInput.value || '').trim().toLowerCase();
    const rows = latestRows.filter((r) => rowMatchesFilter(r, q));
    updateResultCount(rows.length, latestRows.length);

    if (!rows.length) {
      connBody.innerHTML = emptyStateHtml(
        latestRows.length ? '无匹配结果，请调整过滤条件' : '暂无数据，请选择主机后刷新',
        false
      );
      return;
    }

    connBody.innerHTML = rows
      .map((r) => {
        return `<tr class="hover:bg-gray-50 transition-colors">
          <td class="px-4 py-3 font-mono text-xs text-gray-900">${escapeHtml(String(r.peer_ip))}</td>
          <td class="px-4 py-3">${scopeBadge(r.peer_scope)}</td>
          <td class="px-4 py-3 font-mono text-xs text-gray-800">${escapeHtml(String(r.peer_port))}</td>
          <td class="px-4 py-3 font-mono text-xs text-gray-800">${escapeHtml(String(r.local_ip))}</td>
          <td class="px-4 py-3 font-mono text-xs font-semibold text-primary">${escapeHtml(String(r.local_port))}</td>
          <td class="px-4 py-3">${protoBadge(r.protocol)}</td>
          <td class="px-4 py-3 text-right font-mono text-xs text-gray-900">${escapeHtml(formatNum(r.packets))}</td>
          <td class="px-4 py-3 text-right font-mono text-xs text-gray-900">${escapeHtml(formatNum(r.bytes))}</td>
          <td class="px-4 py-3 text-right font-mono text-xs text-gray-500">${r.recv_q}/${r.send_q}</td>
        </tr>`;
      })
      .join('');
  }

  async function loadData() {
    const hostId = hostSelect.value;
    if (!hostId) {
      statusBar.textContent = '请先选择主机。';
      metaBar.classList.add('hidden');
      latestRows = [];
      updateResultCount(0, 0);
      renderTable();
      return;
    }
    refreshBtn.disabled = true;
    statusBar.textContent = '正在通过 SSH 采集，请稍候…';
    try {
      const res = await fetch('/api/host-connection-insight?host_id=' + encodeURIComponent(hostId));
      const data = await res.json();
      if (!res.ok || !data.success) throw new Error(data.message || '请求失败');
      latestRows = data.connections || [];
      const opt = hostSelect.options[hostSelect.selectedIndex];
      const name = opt ? opt.textContent : '';
      statusBar.textContent = `已更新：${name}`;
      renderMeta(data);
      renderTable();
    } catch (e) {
      latestRows = [];
      statusBar.textContent = e.message || '加载失败';
      metaBar.classList.add('hidden');
      updateResultCount(0, 0);
      connBody.innerHTML = emptyStateHtml(e.message || '加载失败', true);
    } finally {
      refreshBtn.disabled = false;
    }
  }

  refreshBtn.addEventListener('click', loadData);
  filterInput.addEventListener('input', () => renderTable());

  autoRefresh.addEventListener('change', () => {
    if (autoTimer) {
      clearInterval(autoTimer);
      autoTimer = null;
    }
    if (autoRefresh.checked) {
      autoTimer = setInterval(() => {
        if (hostSelect.value) loadData();
      }, 20000);
    }
  });

  hostSelect.addEventListener('change', () => {
    latestRows = [];
    if (hostSelect.value) {
      loadData();
    } else {
      statusBar.textContent = '请选择主机后将自动刷新，也可点击「立即刷新」。';
      metaBar.classList.add('hidden');
      updateResultCount(0, 0);
      renderTable();
    }
  });
})();
</script>
{% endblock script %}
